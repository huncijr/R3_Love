<nav class="relative w-full p-4 bg-background mb-5">
  <div class="flex justify-center items-center md:hidden">
    <a routerLink="/home" (click)="closeMenu()" class="logo-entrance">
      <img src="/Images/R3_Love.png" alt="R3 Love" class="h-10 w-auto" />
    </a>
  </div>

  <button
    (click)="toggleMenu()"
    class="absolute top-1/2 left-4 -translate-y-1/2 md:hidden p-1.5 rounded-lg hover:bg-primary-light transition-colors"
  >
    <lucide-icon
      name="menu"
      class="w-5 h-5 text-primary-dark cursor-pointer menu-item-entrance menu-item-delay-2"
    ></lucide-icon>
  </button>
  @if (isMenuOpen()) {
    <div
      class="md:hidden overflow-x-hidden popup-enter absolute text-sm sm:text-base top-10 left-5 mt-2 w-40 sm:w-56 bg-neutral-bg border border-border rounded-xl shadow-xl z-50"
    >
      <div
        class="absolute -top-3 left-6 w-4 h-4 bg-neutral-bg border-l border-t border-border rotate-45"
      ></div>

      <div class="relative flex flex-col p-2 gap-1 bg-secondary/80">
        <a
          routerLink="/home"
          routerLinkActive="text-primary-main font-semibold"
          (click)="closeMenu()"
          class="menu-item-entrance menu-item-delay flex items-center gap-2 py-2 px-3 rounded-lg text-neutral-text hover:bg-primary-light hover:text-primary-dark transition-colors"
        >
          <lucide-icon name="home" class="w-5 h-5 sm:w-4 sm:h-4"></lucide-icon>
          HOME
        </a>
        <div class="flex flex-col relative">
          <button
            (click)="toggleGames()"
            class="menu-item-entrance menu-item-delay-2 flex items-center gap-2 py-2 px-3 rounded-lg text-neutral-text hover:bg-primary-light hover:text-primary-dark transition-colors"
          >
            <lucide-icon name="gamepad-directional" class="w-5 h-5 sm:w-4 sm:h-4"></lucide-icon
            >GAMES
            <lucide-icon
              name="chevron-up"
              class="w-3 h-3 transition-transform duration-200"
              [class.rotate-180]="isGamesOpen()"
            ></lucide-icon>
          </button>
          @if (isGamesOpen()) {
            <div class="flex flex-col mt-1 popup-enter text-ring font-medium">
              <a
                routerLink="/games/calendar"
                (click)="closeMenu()"
                routerLinkActive="font-semibold"
                class="flex items-center gap-2 py-2 pl-5 px-3 rounded-md hover:bg-primary-light hover:text-primary-dark transition-colors"
              >
                <lucide-icon name="calendar-heart" class="w-4 h-4"></lucide-icon>Calendar</a
              >
              <a
                routerLink="/games/calendar"
                routerLinkActive="font-semibold"
                (click)="closeMenu()"
                class="flex items-center gap-2 py-2 px-3 pl-5 rounded-md hover:bg-primary-light hover:text-primary-dark transition-colors"
              >
                <lucide-icon name="gift" class="w-4 h-4"></lucide-icon>Gift game</a
              >
              <a
                routerLink="/games/calendar"
                routerLinkActive="font-semibold"
                (click)="closeMenu()"
                class="flex items-center gap-2 py-2 px-3 pl-5 rounded-md hover:bg-primary-light hover:text-primary-dark transition-colors"
              >
                <lucide-icon name="heart-pulse" class="w-4 h-4"></lucide-icon>Kiss Me</a
              >
            </div>
          }
        </div>

        <a
          routerLink="/account"
          routerLinkActive="text-primary-main font-semibold"
          (click)="closeMenu()"
          class="menu-item-entrance menu-item-delay-3 flex items-center gap-2 py-2 px-3 rounded-lg text-neutral-text hover:bg-primary-light hover:text-primary-dark transition-colors"
        >
          <lucide-icon name="user" class="w-5 h-5 sm:w-4 h-4"></lucide-icon>
          MAKE AN ACCOUNT
        </a>
      </div>
    </div>
  }
  <div
    class="absolute invisible md:relative md:visible md:flex md:justify-between md:items-center md:justify-between md:w-full"
  >
    <a routerLink="/home" class="flex items-center logo-entrance">
      <img src="/Images/R3_Love.png" alt="R3 Love" class="h-1 w-1 md:h-10 md:w-auto" />
    </a>

    <div class="flex md:items-center md:gap-6">
      <a
        routerLink="/home"
        routerLinkActive="text-primary-main font-semibold"
        class="menu-item-entrance menu-item-delay-1 flex items-center gap-1.5 text-sm font-medium text-neutral-text hover:text-primary-main transition-colors"
      >
        <lucide-icon name="home" class="w-4 h-4"></lucide-icon>
        HOME
      </a>
      <div class="relative">
        <button
          (click)="toggleGames()"
          class="menu-item-entrance menu-item-delay-2 flex items-center cursor-pointer gap-1.5 text-sm font-medium text-neutral-text hover:text-primary-main transition-colors"
        >
          <lucide-icon name="gamepad-directional" class="w-4 h-4"></lucide-icon>
          GAMES
          <lucide-icon
            name="chevron-down"
            class="w-3 h-3 transition-transform duration-200"
            [class.rotate-180]="isGamesOpen()"
          ></lucide-icon>
        </button>

        @if (isGamesOpen()) {
          <div
            class="cursor-pointer md:absolute md:top-full md:left-0 md:mt-2 md:w-48 md:bg-neutral-bg md:border md:border-border md:rounded-lg md:shadow-xl md:z-50 md:overflow-hidden flex flex-col md:p-1.5 md:gap-1 pl-6 mt-1 gap-1 popup-enter"
          >
            <a
              routerLink="/games/calendar"
              (click)="closeMenu()"
              class="flex items-center gap-2 text-xs py-1.5 px-2 rounded-md text-neutral-muted hover:bg-primary-light hover:text-primary-dark transition-colors"
            >
              <lucide-icon name="calendar-heart" class="w-4 h-4"></lucide-icon>
              Calendar
            </a>
            <a
              routerLink="/games/gift-game"
              (click)="closeMenu()"
              class="flex items-center gap-2 text-xs py-1.5 px-2 rounded-md text-neutral-muted hover:bg-primary-light hover:text-primary-dark transition-colors"
            >
              <lucide-icon name="gift" class="w-4 h-4"></lucide-icon>
              Gift Game
            </a>
            <a
              routerLink="/games/kiss-me"
              (click)="closeMenu()"
              class="flex items-center gap-2 text-xs py-1.5 px-2 rounded-md text-neutral-muted hover:bg-primary-light hover:text-primary-dark transition-colors"
            >
              <lucide-icon name="heart-pulse" class="w-4 h-4"></lucide-icon>
              Kiss Me
            </a>
          </div>
        }
      </div>
      <a
        routerLink="/account"
        routerLinkActive="text-primary-main font-semibold"
        class="menu-item-entrance menu-item-delay-3 flex items-center gap-1.5 text-sm font-medium text-neutral-text hover:text-primary-main transition-colors"
      >
        <lucide-icon name="user" class="w-4 h-4"></lucide-icon>
        MAKE AN ACCOUNT
      </a>
    </div>
  </div>
  <div
    class="absolute -bottom-4 left-0 right-0 h-6 overflow-visible pointer-events-none wave-entrance"
  >
    <svg viewBox="0 0 1440 48" preserveAspectRatio="none" class="w-full h-full overflow-visible">
      <defs>
        <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#fbcfe8" stop-opacity="0.2" />
          <stop offset="25%" stop-color="#ec4899" stop-opacity="0.9" />
          <stop offset="50%" stop-color="#be185d" stop-opacity="1" />
          <stop offset="75%" stop-color="#ec4899" stop-opacity="0.9" />
          <stop offset="100%" stop-color="#fbcfe8" stop-opacity="0.6" />
        </linearGradient>
        <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ec4899" stop-opacity="0.4" />
          <stop offset="30%" stop-color="#be185d" stop-opacity="0.6" />
          <stop offset="70%" stop-color="#be185d" stop-opacity="0.6" />
          <stop offset="100%" stop-color="#ec4899" stop-opacity="0.7" />
        </linearGradient>
      </defs>

      <!-- Back wave layer -->
      <path
        fill="url(#waveGrad2)"
        d="M0,24 C120,36 240,12 360,24 C480,36 600,12 720,24 C840,36 960,12 1080,24 C1200,36 1320,12 1440,24 L1440,48 L0,48 Z"
      />

      <!-- Front wave layer -->
      <path
        fill="url(#waveGrad1)"
        d="M0,24 C120,12 240,36 360,24 C480,12 600,36 720,24 C840,12 960,36 1080,24 C1200,12 1320,36 1440,24 L1440,48 L0,48 Z"
      />
    </svg>
  </div>
</nav>
