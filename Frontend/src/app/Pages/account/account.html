<div class="min-h-screen flex items-center justify-center">
  <section hlmCard class="w-full max-w-md bg-white shadow-xl border border-border rounded-2xl">
    <div htmlCardHeader class="text-center pb-2">
      <h2 hlmCardTitle class="text-2xl font-bold text-primary">Create Account</h2>
      <p hlmCardDescription class="text-muted">Fill in your details to get started</p>
    </div>
    <div hlmCardContent class="space-y-5">
      <div class="space-y-1.5">
        <label hlmLabel for="username" class="text-sm font-medium text-ring"> Username </label>
        <input
          hlmInput
          id="username"
          type="text"
          placeholder="Enter your username"
          [(ngModel)]="username"
          class="w-full p-2 border-border focus:border-primary-main focus:ring-2 focus:ring-primary-light rounded-lg"
        />
      </div>
      <div class="space-y-1.5">
        <label hlmLabel for="password" class="text-sm font-medium text-ring"> Password </label>
        <input
          hlmInput
          id="password"
          type="password"
          placeholder="Enter your password"
          [(ngModel)]="password"
          class="w-full p-2 border-border focus:border-primary-main focus:ring-2 focus:ring-primary-light rounded-lg"
        />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium text-ring">Gender</label>
        <div class="flex gap-3 p-2">
          <button
            type="button"
            (click)="Setgender('Male')"
            [class.bg-primary-main]="gender() === 'Male'"
            [class.text-white]="gender() === 'Male'"
            [class.bg-primary-light]="gender() !== 'Male'"
            [class.text-primary-dark]="gender() !== 'Male'"
            class="cursor-pointer flex-1 py-2.5 px-4 rounded-lg border border-border font-medium transition-all hover:shadow-md"
          >
            <lucide-icon name="mars" class="w-4 h-4 inline mr-1"></lucide-icon>
            Male
          </button>
          <button
            type="button"
            (click)="Setgender('Female')"
            [class.bg-primary-main]="gender() === 'Female'"
            [class.text-white]="gender() === 'Female'"
            [class.bg-primary-light]="gender() !== 'Female'"
            [class.text-primary-dark]="gender() !== 'Female'"
            class="cursor-pointer flex-1 py-2.5 px-4 rounded-lg border border-border font-medium transition-all hover:shadow-md"
          >
            <lucide-icon name="venus" class="w-4 h-4 inline mr-1"></lucide-icon>
            Female
          </button>
          <button
            type="button"
            (click)="Setgender('Other')"
            [class.bg-primary-main]="gender() === 'Other'"
            [class.text-white]="gender() === 'Other'"
            [class.bg-primary-light]="gender() !== 'Other'"
            [class.text-primary-dark]="gender() !== 'Other'"
            class="cursor-pointer flex-1 py-2.5 px-4 rounded-lg border border-border font-medium transition-all hover:shadow-md"
          >
            <lucide-icon name="user" class="w-4 h-4 inline mr-1"></lucide-icon>
            Other
          </button>
        </div>
      </div>
    </div>
    <div hlmCardFooter class="pt-2 pb-6 px-6">
      <button
        hlmBtn
        (click)="onSubmit()"
        class="w-full bg-primary hover:bg-accent cursor-pointer text-white font-semibold py-2.5 rounded-lg transition-colors shadow-md hover:shadow-lg"
      >
        <lucide-icon name="circle-check" class="w-5 h-5"></lucide-icon>
        Create Account
      </button>
    </div>
  </section>
</div>
