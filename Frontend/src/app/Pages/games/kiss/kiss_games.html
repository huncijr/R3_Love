<div class="flex min-h-screen flex-col bg-neutral-bg p-6">
  <div class="mb-4 flex items-center justify-between">
    <h1 class="m-0 text-3xl font-bold text-primary-dark">Kiss game</h1>
    <div class="actions flex items-center gap-3">
      <button
        hlmBtn
        variant="outline"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full border-2 border-border bg-white p-0 text-primary-dark transition hover:bg-primary-light"
        (click)="toggleGender()"
        title="Switch character"
      >
        <lucide-icon
          [name]="currentGender() === 'male' ? 'mars' : 'venus'"
          class="h-5 w-5"
        ></lucide-icon>
      </button>
      <button
        hlmBtn
        class="inline-flex items-center gap-2 rounded-full bg-primary-main px-6 py-2 text-white shadow-lg transition hover:bg-primary-dark disabled:opacity-50"
        (click)="launchKiss()"
        [disabled]="isKissing()"
      >
        <lucide-icon name="hand-heart" class="h-5 w-5"></lucide-icon>
        <span>Kiss</span>
      </button>
    </div>
  </div>

  <div
    class="scene-container relative flex-1 overflow-hidden rounded-3xl bg-white shadow-[0_12px_30px_rgba(236,72,153,0.2)]"
  >
    <div class="backdrop"></div>
    <div class="stage-platform"></div>

    <div class="character-stage">
      <div
        class="character"
        [class.male]="currentGender() === 'male'"
        [class.female]="currentGender() === 'female'"
        [class.kissing]="isKissing()"
      >
        <div class="hair male-hair" *ngIf="currentGender() === 'male'">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="hair female-hair" *ngIf="currentGender() === 'female'"></div>

        <div class="shadow"></div>
        <div class="head">
          <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
          </div>
        </div>
        <div class="body"></div>
        <div class="arm left">
          <div class="hand"></div>
        </div>
        <div class="arm right">
          <div class="hand"></div>
        </div>
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>

      <div class="hearts" [class.visible]="isKissing()">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
      </div>
    </div>
  </div>
</div>
